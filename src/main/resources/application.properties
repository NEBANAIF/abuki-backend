# ============================================================
#  Abuki ERP — Spring Boot Application Properties
#  All secrets injected via environment variables (Docker / Neon / Render)
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024

# ── Load Balancing: keep-alive thread pool ────────────────────
# Tomcat thread pool — handles concurrent requests from multiple
# Nginx upstream replicas. Default 200 threads is fine; tuned here
# so each backend replica handles load independently.
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ── PostgreSQL / Neon Datasource ─────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ─────────────────────────────────
# Neon free tier: max 5 connections total. When scaling to 2 replicas,
# set MAXIMUM_POOL_SIZE to 2 or 3 per replica to stay under the limit.
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.pool-name=AbukiHikariPool
spring.datasource.hikari.leak-detection-threshold=60000

# ── Hibernate / JPA ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.open-in-view=false

# ── Caffeine Cache ────────────────────────────────────────────
# products cache: 10 min TTL — evicted on any write (create/update/delete)
# analytics cache: 5 min TTL — analytics data refreshes frequently
# expenses cache: 10 min TTL — evicted on any write
spring.cache.type=caffeine
spring.cache.cache-names=products,analytics,expenses
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Actuator ─────────────────────────────────────────────────
# Expose health + caches so you can inspect cache hit rates
management.endpoints.web.exposure.include=health,caches
management.endpoint.health.show-details=never

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:abuki-super-secret-jwt-key-minimum-64-characters-long-random-string-here}
jwt.expiration=86400000

# ── Logging ──────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.abuki=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
